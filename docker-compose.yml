version: '3.8'

services:
  # Main NestJS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-ai-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database - SQLite file stored in volume
      - SQLITE_DB_PATH=/app/data/metadata.db
      
      # Redis (Upstash) - External service
      - REDIS_URL=${REDIS_URL}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
      
      # Vector DB (Upstash) - External service
      - UPSTASH_VECTOR_REST_URL=${UPSTASH_VECTOR_REST_URL}
      - UPSTASH_VECTOR_REST_TOKEN=${UPSTASH_VECTOR_REST_TOKEN}
      
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      
      # Tavily
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      
      # Firecrawl
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      
      # Skyvern
      - SKYVERN_API_KEY=${SKYVERN_API_KEY}
      
      # VAPI
      - VAPI_PUBLIC_KEY=${VAPI_PUBLIC_KEY}
      - VAPI_PRIVATE_KEY=${VAPI_PRIVATE_KEY}
      
      # OpenCode CLI
      - OPENCODE_CLI_PATH=/usr/local/bin/opencode
      
      # E2B Sandbox
      - E2B_API_KEY=${E2B_API_KEY}
      
      # MCP Context7
      - MCP_CONTEXT7_URL=${MCP_CONTEXT7_URL}
      - MCP_CONTEXT7_AUTH_TOKEN=${MCP_CONTEXT7_AUTH_TOKEN}
      - MCP_CONTEXT7_PROJECT_ID=${MCP_CONTEXT7_PROJECT_ID}
      
      # Qwen Model API
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_MODEL=${QWEN_MODEL:-qwen3.6}
      
      # LangGraph Server
      - LANGGRAPH_SERVER_URL=${LANGGRAPH_SERVER_URL:-http://langgraph:8000}
      
      # LangSmith Trace
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-agentic-ai-system}
      - LANGSMITH_TRACING_ENABLED=${LANGSMITH_TRACING_ENABLED:-true}
      
      # Application
      - PORT=3000
      - NODE_ENV=production
    volumes:
      # Persist SQLite database
      - sqlite-data:/app/data
      # Optional: Mount opencode CLI if needed
      - ./opencode:/usr/local/bin/opencode:ro
    networks:
      - agentic-network
    depends_on:
      - langgraph
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # LangGraph Server (Optional - if you want to run it locally)
  langgraph:
    image: langchain/langgraph-api:latest
    container_name: langgraph-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LANGCHAIN_API_KEY=${LANGSMITH_API_KEY}
      - LANGCHAIN_PROJECT=${LANGSMITH_PROJECT:-agentic-ai-system}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_MODEL=${QWEN_MODEL:-qwen3.6}
    volumes:
      - ./langgraph-config:/app/config:ro
    networks:
      - agentic-network
    profiles:
      - with-langgraph
    # Uncomment if you want to run LangGraph locally
    # Otherwise, use external LangGraph service

  # Redis (Optional - for local development, use Upstash in production)
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - agentic-network
    profiles:
      - local-dev
    # Use this only for local development
    # In production, use Upstash Redis (configured via environment variables)

  # SQLite Admin UI (Optional - for database management)
  sqlite-admin:
    image: dbeaver/cloudbeaver:latest
    container_name: sqlite-admin
    restart: unless-stopped
    ports:
      - "8978:8978"
    environment:
      - CB_ADMIN_PASSWORD=admin
      - CB_SERVER_NAME=SQLite Admin
    volumes:
      - sqlite-data:/var/lib/cloudbeaver/data
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    networks:
      - agentic-network
    profiles:
      - with-admin
    depends_on:
      - app

networks:
  agentic-network:
    driver: bridge

volumes:
  sqlite-data:
    driver: local
  redis-data:
    driver: local
  cloudbeaver-data:
    driver: local
